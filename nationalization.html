<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nationalized Indicator of Each Race</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Crimson Pro','Georgia',serif;color:#111;padding:28px 24px;min-height:100vh}
.wrap{max-width:860px;margin:0 auto}
.header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px}
h1{font-size:26px;font-weight:700;letter-spacing:-0.02em}
.year-toggle{display:flex;border:1px solid #ddd;border-radius:4px;overflow:hidden}
.year-toggle button{padding:5px 18px;border:none;cursor:pointer;font-family:inherit;font-size:15px;transition:all .15s}
.year-toggle button.active{background:#111;color:#fff;font-weight:700}
.year-toggle button:not(.active){background:#fff;color:#999;font-weight:400}
.legend{display:flex;gap:16px;margin-bottom:18px;font-size:12px;color:#888}
.legend span{display:flex;align-items:center;gap:5px}
.legend .dot{border-radius:50%;display:inline-block}
.controls{display:flex;align-items:baseline;gap:16px;margin-bottom:10px;flex-wrap:wrap}
.filter-btns{display:flex;gap:4px}
.filter-btns button{padding:3px 10px;border-radius:3px;border:none;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:0.03em;transition:all .15s}
.filter-btns button.active{background:#111;color:#fff;font-weight:700}
.filter-btns button:not(.active){background:transparent;color:#999;font-weight:400}
.filter-btns button span{opacity:0.5}
.median-text{font-size:14px;color:#111;font-weight:600}
.chart-wrap{position:relative}
svg{width:100%;height:auto;border-radius:4px;border:1px solid #E8E8E8;display:block}
.tooltip{position:absolute;background:#fff;border:1px solid #E5E7EB;border-radius:5px;padding:7px 11px;font-size:11px;pointer-events:none;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.08);min-width:160px;font-family:inherit;display:none}
.tooltip .tt-geo{font-weight:700;margin-bottom:3px;color:#111}
.tooltip .tt-type{font-weight:500}
.tooltip .tt-row{color:#666}
.tooltip .tt-adj{color:#111;font-weight:600}
.formula{font-size:11px;color:#aaa;margin-top:16px;line-height:1.6;font-family:system-ui,sans-serif}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Nationalized indicator of each race</h1>
    <div class="year-toggle">
      <button id="btn2018" onclick="setYear('2018')">2018</button>
      <button id="btn2022" class="active" onclick="setYear('2022')">2022</button>
    </div>
  </div>
  <div class="legend">
    <span><span class="dot" style="width:6px;height:6px;background:#94A3B8;opacity:.4"></span>House</span>
    <span><span class="dot" style="width:10px;height:10px;background:#34D399;opacity:.75"></span>Governor</span>
    <span><span class="dot" style="width:10px;height:10px;background:#60A5FA;opacity:.75"></span>Senate</span>
  </div>
  <div class="controls">
    <div class="filter-btns" id="filterBtns"></div>
    <span class="median-text" id="medianText"></span>
  </div>
  <div class="chart-wrap">
    <svg id="chart" viewBox="0 0 820 520"></svg>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <p class="formula" id="formulaText"></p>
</div>

  svg.innerHTML = "";

  const data = getData(), filtered = getFiltered();
  const presYear = getPresYear();
  const med = getMedian(filtered.map(d => d.a));

  // Buttons
  document.getElementById("btn2018").className = year === "2018" ? "active" : "";
  document.getElementById("btn2022").className = year === "2022" ? "active" : "";

  const counts = {House:0,Governor:0,Senate:0};
  data.forEach(d => { if(d.t==="House") counts.House++; else if(d.t==="Governor") counts.Governor++; else counts.Senate++; });

  const fb = document.getElementById("filterBtns");
  fb.innerHTML = "";
  ["All","House","Governor","Senate"].forEach(f => {
    const b = document.createElement("button");
    b.className = filter === f ? "active" : "";
    const n = f === "All" ? data.length : counts[f] || 0;
    b.innerHTML = `${f} <span>${n}</span>`;
    b.onclick = () => { filter = f; render(); };
    fb.appendChild(b);
  });

  document.getElementById("medianText").innerHTML = `median <span style="color:${mc(med)}">${fmt(med)}</span>`;
  document.getElementById("formulaText").innerHTML = `Adj D% = D%<sub>${year}</sub> × (D%<sub>natl</sub> / D%<sub>${presYear}pres</sub>), normalized. Adj R% likewise. Y = Adj D% − Adj R%.`;

  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k,v] of Object.entries(attrs||{})) e.setAttribute(k, v);
    return e;
  }

  // Background
  svg.appendChild(el("rect", {x:0,y:0,width:W,height:H,fill:"#FCFCFC",rx:4}));
  svg.appendChild(el("rect", {x:M.left,y:M.top,width:xS(0)-M.left,height:iH,fill:"#FEF2F2",opacity:0.4}));
  svg.appendChild(el("rect", {x:xS(0),y:M.top,width:M.left+iW-xS(0),height:iH,fill:"#EFF6FF",opacity:0.4}));
  svg.appendChild(el("rect", {x:M.left,y:yS(0),width:iW,height:M.top+iH-yS(0),fill:"#FEF2F2",opacity:0.15}));
  svg.appendChild(el("rect", {x:M.left,y:M.top,width:iW,height:yS(0)-M.top,fill:"#EFF6FF",opacity:0.15}));

  const xT = [-80,-60,-40,-20,0,20,40,60,80], yT = [-60,-40,-20,0,20,40,60];
  xT.forEach(t => svg.appendChild(el("line", {x1:xS(t),x2:xS(t),y1:M.top,y2:M.top+iH,stroke:t===0?"#CBD5E1":"#F1F5F9","stroke-width":t===0?1:0.5})));
  yT.forEach(t => svg.appendChild(el("line", {x1:M.left,x2:M.left+iW,y1:yS(t),y2:yS(t),stroke:t===0?"#CBD5E1":"#F1F5F9","stroke-width":t===0?1:0.5})));

  // 45° line
  svg.appendChild(el("line", {x1:xS(-70),y1:yS(-70),x2:xS(70),y2:yS(70),stroke:"#CBD5E1","stroke-width":0.75,"stroke-dasharray":"4 3"}));

  // Median
  const medC = mc(med);
  svg.appendChild(el("line", {x1:M.left,x2:M.left+iW,y1:yS(med),y2:yS(med),stroke:medC,"stroke-width":1.5,"stroke-dasharray":"8 4",opacity:0.7}));
  svg.appendChild(el("rect", {x:M.left+iW-82,y:yS(med)-14,width:78,height:18,rx:3,fill:"#fff",stroke:medC,"stroke-width":0.75,opacity:0.9}));
  const medLabel = el("text", {x:M.left+iW-43,y:yS(med)-2,fill:medC,"font-size":10,"text-anchor":"middle","font-weight":700,"font-family":"'Crimson Pro',Georgia,serif"});
  medLabel.textContent = `median ${fmt(med)}`;
  svg.appendChild(medLabel);

  // Axis labels
  xT.forEach(t => { const tx = el("text",{x:xS(t),y:M.top+iH+16,fill:"#94A3B8","font-size":9,"text-anchor":"middle","font-family":"'Crimson Pro',Georgia,serif"}); tx.textContent = t>0?`D+${t}`:t<0?`R+${-t}`:"0"; svg.appendChild(tx); });
  yT.forEach(t => { const tx = el("text",{x:M.left-6,y:yS(t)+3.5,fill:"#94A3B8","font-size":9,"text-anchor":"end","font-family":"'Crimson Pro',Georgia,serif"}); tx.textContent = t>0?`D+${t}`:t<0?`R+${-t}`:"0"; svg.appendChild(tx); });

  const xLabel = el("text",{x:M.left+iW/2,y:H-4,fill:"#94A3B8","font-size":10,"text-anchor":"middle","font-weight":500});
  xLabel.textContent = `Raw ${year} D−R Margin`; svg.appendChild(xLabel);
  const yLabel = el("text",{x:10,y:M.top+iH/2,fill:"#94A3B8","font-size":10,"text-anchor":"middle","font-weight":500,transform:`rotate(-90, 10, ${M.top+iH/2})`});
  yLabel.textContent = `Adjusted D−R (×${presYear} ratios)`; svg.appendChild(yLabel);

  const rLab = el("text",{x:M.left+6,y:M.top+iH-6,fill:"#F87171","font-size":9,opacity:0.35,"font-weight":600}); rLab.textContent="R"; svg.appendChild(rLab);
  const dLab = el("text",{x:M.left+iW-6,y:M.top+14,fill:"#3B82F6","font-size":9,opacity:0.35,"font-weight":600,"text-anchor":"end"}); dLab.textContent="D"; svg.appendChild(dLab);

  // Points
  filtered.forEach(d => {
    const c = el("circle", {cx:xS(d.r),cy:yS(d.a),r:d.t==="House"?2.5:4.5,fill:gc(d.t),opacity:d.t==="House"?0.35:0.75,style:"cursor:pointer;transition:opacity 0.1s"});
    c.addEventListener("mousemove", e => {
      const rect = svg.getBoundingClientRect();
      const x = e.clientX - rect.left + 14, y = e.clientY - rect.top - 12;
      tt.style.display = "block";
      tt.style.left = Math.min(x, 660) + "px";
      tt.style.top = y + "px";
      tt.innerHTML = `<div class="tt-geo">${d.g} <span class="tt-type" style="color:${gc(d.t)}">${d.t}</span></div>`
        + `<div class="tt-row">${presYear} Pres: <b style="color:${mc(d.p)}">${fmt(d.p)}</b></div>`
        + `<div class="tt-row">Raw ${year}: <b style="color:${mc(d.r)}">${fmt(d.r)}</b></div>`
        + `<div class="tt-adj">Adjusted: <b style="color:${mc(d.a)}">${fmt(d.a)}</b></div>`;
      c.setAttribute("opacity", 1);
      c.setAttribute("stroke", "#111");
      c.setAttribute("stroke-width", 1.5);
    });
    c.addEventListener("mouseleave", () => {
      tt.style.display = "none";
      c.setAttribute("opacity", d.t==="House"?0.35:0.75);
      c.removeAttribute("stroke");
      c.removeAttribute("stroke-width");
    });
    svg.appendChild(c);
  });
}

function setYear(y) { year = y; filter = "All"; render(); }
render();
</script>
</body>
</html>
